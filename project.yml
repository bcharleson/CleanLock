name: CleanLock
options:
  bundleIdPrefix: com.brandoncharleson
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.brandoncharleson.CleanLock
    MARKETING_VERSION: "1.1.3"
    CURRENT_PROJECT_VERSION: "5"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES
targets:
  CleanLock:
    type: application
    platform: macOS
    sources:
      - path: CleanLock
        excludes:
          - "**/*.md"
    settings:
      base:
        INFOPLIST_FILE: CleanLock/Info.plist
        PRODUCT_NAME: CleanLock
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: CleanLock/CleanLock.entitlements
        # Not sandboxed — CGEvent taps require Accessibility outside the sandbox.
        ENABLE_APP_SANDBOX: NO
    info:
      path: CleanLock/Info.plist
      properties:
        CFBundleName: CleanLock
        CFBundleDisplayName: CleanLock
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundlePackageType: APPL
        CFBundleExecutable: CleanLock
        CFBundleIdentifier: com.brandoncharleson.CleanLock
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: public.app-category.utilities
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "Copyright © 2026 Brandon Charleson. MIT License."
        # Keep Dock icon so the app is easy to launch from Spotlight / Dock.
        LSUIElement: false
